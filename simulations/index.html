<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulations — Card Counting & Quantitative Finance</title>
<style>
  :root{
    --paper:#ffffff;
    --paper-dim:#eef3fa;
    --ink:#0d1b32;
    --text-on-paper:#0d1b32;
    --text-on-paper-dim:#5a6b85;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:var(--paper);
    color:var(--text-on-paper);
    font-family:"Times New Roman", Times, serif;
    padding:18px;
  }
  .wrap{max-width:820px;margin:0 auto;}

  .top-bar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:28px;
    border-bottom:1px solid #c9a445;
    padding-bottom:14px;
  }
  .brand-main{
    font-size:0.7rem;
    letter-spacing:0.08em;
    color:var(--text-on-paper);
    text-transform:uppercase;
    font-weight:700;
  }
  .brand-sub{
    font-size:0.62rem;
    letter-spacing:0.04em;
    color:var(--text-on-paper-dim);
    margin-top:1px;
  }
  .back-link{
    font-size:0.7rem;
    color:#0c3d2c;
    text-decoration:none;
    border-bottom:1px solid #c9a445;
    padding-bottom:2px;
  }

  h1{
    font-size:2rem;
    color:#0c3d2c;
    margin:0 0 24px 0;
  }

  .links{
    display:flex;
    flex-direction:column;
  }
  .link-card{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#fdf8ec;
    border:1px solid #c9a445;
    border-radius:4px;
    padding:20px 24px;
    text-decoration:none;
    color:var(--ink);
    transition:background 0.15s, border-color 0.15s;
  }
  .link-card:not(:last-child){
    margin-bottom:22px;
    position:relative;
  }
  .link-card:not(:last-child)::after{
    content:"";
    position:absolute;
    left:0;
    right:0;
    bottom:-12px;
    height:1px;
    background:rgba(201,164,69,0.35);
  }
  .link-card:hover{
    background:#f5ecd2;
    border-color:#0c3d2c;
  }
  .link-title{
    font-weight:700;
    font-size:1.05rem;
    color:#0c3d2c;
    font-family:"Courier New", monospace;
  }
  .link-desc{
    font-size:0.85rem;
    color:var(--text-on-paper-dim);
    margin-top:2px;
    font-family:"Times New Roman", Times, serif;
  }
  .arrow{
    color:#c9a445;
    font-size:1.2rem;
    flex-shrink:0;
    margin-left:16px;
  }

  footer{
    margin-top:40px;
    font-size:0.7rem;
    color:var(--text-on-paper-dim);
    text-align:center;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top-bar">
    <div>
      <div class="brand-main">Atlas Research</div>
      <div class="brand-sub">Card Counting & Quantitative Finance</div>
    </div>
    <a class="back-link" href="../index.html">&larr; Back to course</a>
  </div>

  <h1>Simulations</h1>

  <div class="links">
    <a class="link-card" href="blackjack_sim.py">
      <div>
        <div class="link-title">blackjack_sim.py</div>
        <div class="link-desc">House-edge / EV simulator (basic strategy, Hi-Lo, Omega II)</div>
      </div>
      <div class="arrow">→</div>
    </a>

    <a class="link-card" href="bankroll_bot_sim.py">
      <div>
        <div class="link-title">bankroll_bot_sim.py</div>
        <div class="link-desc">Bankroll and risk-of-ruin simulator</div>
      </div>
      <div class="arrow">→</div>
    </a>
  </div>

  <footer>Atlas Research</footer>
</div>
</body>
</html>
